name: Deploy

# Manually triggered. Pick an environment (development | production) at run
# time. Defaults to a safe `--unpublished` push for production so a deploy
# never overwrites the live theme without a follow-up promote in the admin.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'shopify.theme.toml environment to deploy'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production
      allow_live:
        description: 'Production only: overwrite the live theme instead of pushing as unpublished'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Push theme
        env:
          # Theme Access token — generated from Shopify admin > Apps > Theme Access.
          # The store URL comes from shopify.theme.toml via the -e flag.
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
        run: |
          set -euo pipefail
          if [ "${{ inputs.environment }}" = "production" ] && [ "${{ inputs.allow_live }}" != "true" ]; then
            echo "Pushing production as UNPUBLISHED (preview-only)."
            shopify theme push -e production --unpublished --json
          elif [ "${{ inputs.environment }}" = "production" ]; then
            echo "Pushing production to LIVE theme. allow_live=true was set."
            shopify theme push -e production --allow-live --json
          else
            shopify theme push -e ${{ inputs.environment }} --unpublished --json
          fi
